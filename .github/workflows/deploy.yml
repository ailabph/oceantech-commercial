name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-brand-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build brand-1
        run: |
          cd apps/brand-1
          npm install
          npm run build
      - name: Deploy brand-1 to Cloudflare Pages
        run: npx wrangler pages deploy apps/brand-1/out --project-name=oceantech-brand-1 --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-brand-2:
