name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << SSHEOF
          Host jump
            HostName ${{ secrets.JUMP_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyJump jump
            StrictHostKeyChecking no
          SSHEOF

      - name: Pull latest code
        run: ssh vps "cd ~/oceantech-commercial && git pull"

      - name: Deploy brand-1
        run: ssh vps "cd ~/oceantech-commercial/apps/brand-1 && npm install && npm run build && systemctl --user restart oceantech-brand-1"

      - name: Deploy brand-2
        run: ssh vps "cd ~/oceantech-commercial/apps/brand-2 && npm install && npm run build && systemctl --user restart oceantech-brand-2"

      - name: Deploy brand-3
        run: ssh vps "cd ~/oceantech-commercial/apps/brand-3 && npm install && npm run build && systemctl --user restart oceantech-brand-3"
