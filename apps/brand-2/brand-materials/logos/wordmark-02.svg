<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150">
  <defs>
    <style>
      .logo-font {
        font-family: 'Bebas Neue', 'Oswald', Impact, 'Arial Black', sans-serif;
      }
      .wordmark {
        font-size: 60px;
        font-weight: 900;
        fill: #0B1426;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .tagline {
        font-size: 18px;
        font-weight: 600;
        fill: #8C9EAF;
        letter-spacing: 0.35em;
        font-variant: small-caps;
      }
    </style>
  </defs>

  <g text-anchor="middle">
    <!-- Main Wordmark: OCEANTECH -->
    <text x="50%" y="70" class="logo-font wordmark">
      OCEANTECH
    </text>

    <!-- Separator Line -->
    <line x1="160" y1="88" x2="440" y2="88" stroke="#D4A017" stroke-width="1.5" />

    <!-- Tagline: COMMERCIAL DIVING -->
    <text x="50%" y="112" class="logo-font tagline">
      COMMERCIAL DIVING
    </text>
  </g>
</svg>